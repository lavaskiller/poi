<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POI 평가 도구 명세서 뷰어</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171a21;
      --panel2: #1f2430;
      --text: #e7e9ee;
      --muted: #9aa3b2;
      --line: #313846;
      --accent: #7aa2ff;
      --accent2: #65d6ad;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(15,17,21,.94);
      backdrop-filter: blur(10px);
      padding: 14px 18px;
    }
    h1 { margin: 0 0 8px; font-size: 18px; }
    .meta { color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button, a.button {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
    }
    button:hover, a.button:hover { border-color: var(--accent); }
    main { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 92px); }
    nav {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      overflow: auto;
      max-height: calc(100vh - 92px);
      position: sticky;
      top: 92px;
    }
    nav a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }
    nav a:hover { color: var(--accent); }
    nav a.h3 { padding-left: 12px; }
    nav a.h4 { padding-left: 24px; font-size: 12px; }
    article { padding: 26px 34px 80px; max-width: 1100px; }
    .line {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      min-height: 22px;
      border-radius: 6px;
      scroll-margin-top: 118px;
    }
    .line:hover { background: rgba(122,162,255,.06); }
    .ln { color: #596273; text-align: right; user-select: none; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .txt { white-space: pre-wrap; word-break: break-word; }
    .heading .txt { color: #fff; font-weight: 700; }
    .h1 .txt { font-size: 24px; margin: 8px 0; }
    .h2 .txt { font-size: 21px; margin: 18px 0 6px; color: var(--accent); }
    .h3 .txt { font-size: 17px; margin: 14px 0 4px; color: var(--accent2); }
    .h4 .txt { font-size: 15px; margin: 10px 0 2px; }
    .code .txt, .table .txt { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
    .target { outline: 2px solid var(--accent); background: rgba(122,162,255,.12); }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      nav { position: static; max-height: none; border-right: 0; border-bottom: 1px solid var(--line); }
      article { padding: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>POI 평가 도구 명세서 뷰어</h1>
    <div class="meta">source: <code>poi-test-data/PRD-SRD-dataset-dashboard.md</code></div>
    <div class="actions">
      <button data-jump="doc-overview">문서 개요로 이동</button>
      <button data-jump="overview-tab">오버뷰 탭 명세로 이동</button>
      <a class="button" href="/dataset-overview.html">실제 데이터셋 오버뷰 화면</a>
      <a class="button" href="/mvp-eval-ui.html">MVP 평가 UI 목업</a>
    </div>
  </header>
  <main>
    <nav id="toc">Loading…</nav>
    <article id="doc">Loading…</article>
  </main>
  <script>
    const source = '/PRD-SRD-dataset-dashboard.md';
    const doc = document.getElementById('doc');
    const toc = document.getElementById('toc');

    function idForHeading(text, lineNo) {
      if (text === '## 개요') return 'doc-overview';
      if (text === '## 6. ① 개요') return 'overview-tab';
      return 'line-' + lineNo;
    }

    function jumpTo(id) {
      document.querySelectorAll('.target').forEach(el => el.classList.remove('target'));
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add('target');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', '#' + id);
    }

    fetch(source, { cache: 'no-store' })
      .then(r => r.text())
      .then(text => {
        const lines = text.split('\n');
        let inCode = false;
        const tocItems = [];
        doc.innerHTML = lines.map((line, idx) => {
          const no = idx + 1;
          if (line.startsWith('```')) inCode = !inCode;
          const match = line.match(/^(#{1,4})\s+/);
          const headingLevel = match ? match[1].length : 0;
          const id = headingLevel ? idForHeading(line, no) : 'line-' + no;
          let cls = 'line';
          if (headingLevel) {
            cls += ' heading h' + headingLevel;
            tocItems.push({ id, text: line.replace(/^#{1,4}\s+/, ''), level: headingLevel, no });
          }
          if (inCode || line.startsWith('```')) cls += ' code';
          if (line.startsWith('|')) cls += ' table';
          const safe = line.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
          return `<div class="${cls}" id="${id}"><div class="ln">${no}</div><div class="txt">${safe || '&nbsp;'}</div></div>`;
        }).join('');
        toc.innerHTML = tocItems.map(item =>
          `<a class="h${item.level}" href="#${item.id}" data-id="${item.id}">${item.no}. ${item.text}</a>`
        ).join('');
        toc.addEventListener('click', e => {
          const a = e.target.closest('a[data-id]');
          if (!a) return;
          e.preventDefault();
          jumpTo(a.dataset.id);
        });
        document.querySelectorAll('[data-jump]').forEach(btn => {
          btn.addEventListener('click', () => jumpTo(btn.dataset.jump));
        });
        if (location.hash) jumpTo(location.hash.slice(1));
      })
      .catch(err => {
        doc.textContent = '명세서를 불러오지 못했습니다: ' + err.message;
        toc.textContent = 'Load failed';
      });
  </script>
</body>
</html>
